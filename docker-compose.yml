services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    # Come back on its own if the process dies (e.g. OOM under load) so `web`
    # isn't left unable to resolve/reach `db`.
    restart: unless-stopped
    # Cap memory so MySQL can't consume the whole box and trigger the OOM-killer
    # (which is what dropped `db` off the network under load).
    mem_limit: 512m
    # Tune for a tiny host with a tiny dataset (11 seeded events): small buffer
    # pool, few connections, and drop performance_schema to reclaim ~memory. The
    # data is ephemeral anyway, so relax fsync durability for less I/O load.
    command:
      - --innodb-buffer-pool-size=64M
      - --max-connections=30
      - --performance-schema=OFF
      - --innodb-flush-log-at-trx-commit=2
    # No persistent storage: the DB starts empty every time and the app
    # re-seeds it on startup. Data lives only in the container's writable layer.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
    ports:
      - "80:8000"
    volumes:
      - .:/app
    # Recover automatically if the app exits (e.g. it loses the DB connection
    # when the DB crashes) and whenever the DB itself is restarted.
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        restart: true

  # On-demand DAST scan. Not started by `docker compose up` — it only runs when
  # you explicitly select the "scan" profile (see command below). It targets the
  # app over the internal Compose network (service name `web`, container port 8000).
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["scan"]
    volumes:
      - ./zap-reports:/zap/wrk:rw
    command:
      - zap-full-scan.py
      - -t
      - "http://web:8000/?id=1"
      - -r
      - zap-report.html
      - -J
      - zap-report.json
      - -I
    depends_on:
      web:
        condition: service_started

  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8089:8080"
    volumes:
      - ./adminer/plugins-enabled:/var/www/html/plugins-enabled:ro
    depends_on:
      db:
        condition: service_healthy
