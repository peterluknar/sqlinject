services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: app
    ports:
      - "8088:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  # On-demand DAST scan. Not started by `docker compose up` — it only runs when
  # you explicitly select the "scan" profile (see command below). It targets the
  # app over the internal Compose network (service name `web`, container port 8000).
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["scan"]
    volumes:
      - ./zap-reports:/zap/wrk:rw
    command:
      - zap-full-scan.py
      - -t
      - "http://web:8000/?id=1"
      - -r
      - zap-report.html
      - -J
      - zap-report.json
      - -I
    depends_on:
      web:
        condition: service_started

  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8089:8080"
    volumes:
      - ./adminer/plugins-enabled:/var/www/html/plugins-enabled:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
